<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Sprint V11.1</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
color:white;
font-family:sans-serif;
background:linear-gradient(-45deg,#022c22,#064e3b,#111827,#000);
background-size:400% 400%;
animation:bg 10s infinite;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.card{background:#111;padding:16px;border-radius:14px;margin:10px 0}
.gold{color:#FBBF24}
.green{color:#22c55e}

/* Opening */
#opening{animation:fadeIn 1s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>

<body class="p-4">

<!-- 🎮 OPENING -->
<div id="opening" class="h-screen flex flex-col items-center justify-center text-center">

<h1 class="text-4xl gold mb-6">💰 Cash Sprint</h1>

<p id="loadingText" class="green">Initializing system...</p>

<div class="w-64 bg-gray-700 h-2 mt-4 rounded">
<div id="loadingBar" class="bg-green-500 h-2 rounded" style="width:0%"></div>
</div>

<p class="mt-6 text-sm opacity-60">Financial Engine v1.1</p>

</div>

<!-- 📱 APP -->
<div id="app" style="display:none">

<h1 class="gold text-2xl">Cash Sprint</h1>

<input id="email" placeholder="Email" class="w-full p-2 text-black mt-3">
<input id="password" type="password" placeholder="Password" class="w-full p-2 text-black mt-2">

<button onclick="login()" class="bg-green-500 w-full mt-2 p-2">Connexion</button>

<!-- ADMIN -->
<div id="adminPanel" style="display:none" class="card mt-3">
<h2 class="gold">🔐 Developer Dashboard</h2>
<p>Users: <span id="users">1</span></p>
<p>Revenue: <span id="revenue">0</span></p>
<div id="logs"></div>
</div>

<!-- GOALS -->
<div id="goalsDiv"></div>

<button onclick="createGoal()" class="bg-yellow-500 w-full mt-3 p-2">
➕ Nouveau objectif
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAp72rOdvQhQFb6FddX0n_0Mmhx_qM47RI",
    authDomain: "cash-sprint-973d3.firebaseapp.com",
    projectId: "cash-sprint-973d3",
    storageBucket: "cash-sprint-973d3.firebasestorage.app",
    messagingSenderId: "844467713591",
    appId: "1:844467713591:web:38837f628d72f36b9e71b2",
    measurementId: "G-BYQQ0S4210"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ADMIN = "Tchoumkeuprince3@gmail.com";

/* 🔊 SOUND SYSTEM */
const sound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

/* 📳 VIBRATION */
function vibrate(ms){
if(navigator.vibrate){
navigator.vibrate(ms);
}
}

/* 🎮 OPENING */
let progress = 0;

let texts = [
"Initializing system...",
"Loading financial engine...",
"Securing data...",
"Preparing dashboard...",
"Launching Cash Sprint..."
];

let i = 0;

let interval = setInterval(()=>{
progress += 20;
loadingBar.style.width = progress + "%";

loadingText.innerText = texts[i];
i++;

sound.play();
vibrate(50);

if(progress >= 100){
clearInterval(interval);

setTimeout(()=>{
document.getElementById("opening").style.display="none";
document.getElementById("app").style.display="block";
vibrate(200);
},800);
}

},700);

/* LOGIN */
window.login = async ()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);

if(email.value===ADMIN){
adminPanel.style.display="block";
}

loadGoals();
vibrate(100);
sound.play();

}catch(e){
alert("Erreur: "+e.message);
log("ERROR: "+e.message);
}
};

/* DATA */
let goals = JSON.parse(localStorage.getItem("goals")||"[]");

/* CREATE GOAL */
window.createGoal=()=>{
if(goals.length>=2){alert("Max 2 objectifs");return;}

let name=prompt("Nom objectif");
let amount=prompt("Montant cible");

goals.push({id:Date.now(),name,target:Number(amount),saved:0});
save();
loadGoals();

vibrate(80);
sound.play();
log("Création objectif");
};

/* LOAD */
function loadGoals(){
goalsDiv.innerHTML="";

goals.forEach(g=>{
let p=(g.saved/g.target*100)||0;

goalsDiv.innerHTML+=`
<div class="card">
<h3>${g.name}</h3>

<div class="w-full bg-gray-700 h-3 rounded mt-2">
<div style="width:${p}%" class="bg-green-500 h-3 rounded"></div>
</div>

<p>${g.saved}/${g.target}</p>

<button onclick="add(${g.id})" class="bg-green-500 w-full mt-2">
Ajouter fonds
</button>
</div>
`;
});
}

/* ADD MONEY */
window.add=(id)=>{
let val=prompt("Montant");

let g=goals.find(x=>x.id==id);
g.saved+=Number(val);

if(g.saved>=g.target){
alert("🎉 Objectif atteint !");
vibrate([200,100,200]);
}

save();
loadGoals();
sound.play();
log("Ajout fonds");
};

/* SAVE */
function save(){
localStorage.setItem("goals",JSON.stringify(goals));
}

/* LOGS */
function log(msg){
let logs=JSON.parse(localStorage.getItem("logs")||"[]");
logs.push(new Date().toLocaleTimeString()+" - "+msg);
localStorage.setItem("logs",JSON.stringify(logs));
document.getElementById("logs").innerHTML=logs.join("<br>");
}

</script>

</body>
  </html>
