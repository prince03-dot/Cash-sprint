<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cash Sprint V13</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
color:white;
font-family:sans-serif;
background:linear-gradient(-45deg,#022c22,#064e3b,#111827,#000);
background-size:400% 400%;
animation:bg 10s infinite;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.card{
background:#111;
padding:16px;
border-radius:16px;
margin:12px 0;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#14532d;
}

.gold{color:#FBBF24}
.green{color:#22c55e}
.slide{display:none}
.slide.active{display:block}
</style>
</head>

<body class="p-4">

<!-- 🎮 OPENING -->
<div id="opening" class="h-screen flex flex-col items-center justify-center text-center">
<h1 class="text-4xl gold">💰 Cash Sprint</h1>
<p id="loadingText">Initializing...</p>

<div class="w-64 bg-gray-700 h-2 mt-4">
<div id="bar" class="bg-green-500 h-2"></div>
</div>
</div>

<!-- 📖 ONBOARDING -->
<div id="onboard" style="display:none" class="h-screen flex flex-col justify-center text-center">
<div class="slide active">
<h2>📈 Discipline</h2>
<p>"Épargne avant de dépenser"</p>
</div>

<div class="slide">
<h2>💎 Liberté</h2>
<p>"Chaque pièce compte"</p>
</div>

<div class="slide">
<h2>🚀 Action</h2>
<p>Commence maintenant</p>
<button onclick="startApp()" class="bg-green-500 p-3 w-full mt-4">Continuer</button>
</div>
</div>

<!-- 📱 APP -->
<div id="app" style="display:none">

<h1 class="gold text-2xl">Cash Sprint</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email" class="w-full p-2 text-black mt-2">
<input id="password" type="password" placeholder="Password" class="w-full p-2 text-black mt-2">
<button onclick="login()" class="bg-green-500 w-full mt-2 p-2">Connexion</button>

<!-- STATS (Duolingo style) -->
<div class="card">
<p>🔥 Streak: <span id="streakDisplay">0</span></p>
<p>⭐ XP: <span id="xpDisplay">0</span></p>
</div>

<!-- LEVELS -->
<div class="card">
<h2 class="gold">Parcours</h2>

<div class="card" onclick="openLevel(1)">
🟢 Niveau 1 - Créer objectif
</div>

<div class="card" onclick="openLevel(2)">
🟡 Niveau 2 - Ajouter fonds
</div>

<div class="card" onclick="openLevel(3)">
🔵 Niveau 3 - Atteindre objectif
</div>

</div>

<!-- PLANS -->
<div class="card">
<h2 class="gold">Plans d’épargne</h2>

<button onclick="quickGoal('Loyer')" class="bg-yellow-500 w-full mt-2 p-2">🏠 Loyer</button>
<button onclick="quickGoal('Voiture')" class="bg-yellow-500 w-full mt-2 p-2">🚗 Voiture</button>
<button onclick="quickGoal('Projet')" class="bg-yellow-500 w-full mt-2 p-2">💼 Projet</button>

<button onclick="createGoal()" class="bg-green-500 w-full mt-2 p-2">
➕ Personnaliser
</button>
</div>

<!-- GOALS -->
<div id="goals"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAp72rOdvQhQFb6FddX0n_0Mmhx_qM47RI",
    authDomain: "cash-sprint-973d3.firebaseapp.com",
    projectId: "cash-sprint-973d3",
    storageBucket: "cash-sprint-973d3.firebasestorage.app",
    messagingSenderId: "844467713591",
    appId: "1:844467713591:web:38837f628d72f36b9e71b2",
    measurementId: "G-BYQQ0S4210"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* SOUND + VIBRATION */
const sound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
function vib(x){if(navigator.vibrate)navigator.vibrate(x);}

/* OPENING */
let p=0;
let interval=setInterval(()=>{
p+=20;
bar.style.width=p+"%";
sound.play();
vib(30);

if(p>=100){
clearInterval(interval);
setTimeout(()=>{
opening.style.display="none";
onboard.style.display="flex";
},500);
}
},600);

/* SLIDES */
let s=0;
let slides=document.querySelectorAll(".slide");
setInterval(()=>{
slides[s].classList.remove("active");
s=(s+1)%slides.length;
slides[s].classList.add("active");
},3000);

window.startApp=()=>{
onboard.style.display="none";
app.style.display="block";
updateStreak();
updateStats();
};

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
alert("Connexion réussie");
sound.play();
vib(100);
}catch(e){
alert(e.message);
}
};

/* XP + STREAK */
let xp=Number(localStorage.getItem("xp")||0);
let streak=Number(localStorage.getItem("streak")||0);

function updateStats(){
xpDisplay.innerText=xp;
streakDisplay.innerText=streak;
}

function addXP(x){
xp+=x;
localStorage.setItem("xp",xp);
updateStats();
}

function updateStreak(){
let last=localStorage.getItem("last");
let today=new Date().toDateString();

if(last!==today){
streak++;
localStorage.setItem("streak",streak);
localStorage.setItem("last",today);
}
}

/* LEVELS */
window.openLevel=(lvl)=>{
if(lvl==1){createGoal();addXP(10);}
if(lvl==2){addXP(15);}
if(lvl==3){addXP(20);}
sound.play();
vib(100);
};

/* GOALS */
let goals=JSON.parse(localStorage.getItem("goals")||"[]");

window.quickGoal=(n)=>createGoal(n);

window.createGoal=(n)=>{
if(goals.length>=2){alert("Max 2 objectifs");return;}

let name=n||prompt("Nom objectif");
let amount=prompt("Montant");

goals.push({id:Date.now(),name,target:Number(amount),saved:0});
save();loadGoals();addXP(10);
};

function loadGoals(){
goalsDiv.innerHTML="";
goals.forEach(g=>{
let p=(g.saved/g.target*100)||0;

goalsDiv.innerHTML+=`
<div class="card">
<h3>${g.name}</h3>

<div class="w-full bg-gray-700 h-3">
<div style="width:${p}%" class="bg-green-500 h-3"></div>
</div>

<p>${g.saved}/${g.target}</p>

<button onclick="add(${g.id})" class="bg-green-500 w-full mt-2">
Ajouter fonds
</button>
</div>`;
});
}

window.add=(id)=>{
let val=prompt("Montant");
let g=goals.find(x=>x.id==id);
g.saved+=Number(val);

if(g.saved>=g.target){
alert("🎉 Objectif atteint !");
addXP(50);
}

save();loadGoals();
sound.play();
};

/* SAVE */
function save(){
localStorage.setItem("goals",JSON.stringify(goals));
}

</script>

</body>
  </html>
